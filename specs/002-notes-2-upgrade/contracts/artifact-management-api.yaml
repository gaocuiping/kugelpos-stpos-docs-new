openapi: 3.0.3
info:
  title: Artifact Management API
  description: |
    Cloud Sync Service API for downloading artifacts (files and container images) and reporting completion status.

    This API handles:
    - File download from cloud storage
    - Download completion notification
    - Apply completion notification with rollback status
  version: 1.0.0
  contact:
    name: Kugelpos Development Team
    email: dev@kugelpos.com

servers:
  - url: https://sync.kugelpos.cloud/api/v1
    description: Production environment
  - url: http://localhost:8007/api/v1
    description: Local development

tags:
  - name: Artifact Download
    description: Endpoints for downloading artifacts and container images
  - name: Status Notification
    description: Endpoints for reporting download and apply completion

paths:
  /artifact-management/download:
    post:
      tags:
        - Artifact Download
      summary: Download artifact file
      description: |
        Downloads a specific artifact (script, module, config, etc.) from cloud storage.
        Returns the file as binary stream with checksum in response header.
      operationId: downloadArtifact
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactDownloadRequest'
            examples:
              script:
                summary: Download startup script
                value:
                  artifact_type: script
                  artifact_name: pos-startup.sh
                  version: "1.2.3"
              module:
                summary: Download Python module
                value:
                  artifact_type: module
                  artifact_name: kugelpos_common-1.2.3-py3-none-any.whl
                  version: "1.2.3"
      responses:
        '200':
          description: File download successful
          headers:
            X-Checksum:
              description: SHA256 checksum of the file
              schema:
                type: string
                example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
            X-File-Size:
              description: File size in bytes
              schema:
                type: integer
                example: 15360
            Content-Type:
              description: MIME type of the file
              schema:
                type: string
                example: application/octet-stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /artifact-management/download-complete:
    post:
      tags:
        - Status Notification
      summary: Notify download completion
      description: |
        Edge device notifies cloud that download phase (Phase 1-3) is complete.
        Updates device version status to "pending_apply".
      operationId: notifyDownloadComplete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DownloadCompleteRequest'
            examples:
              success:
                summary: Download completed successfully
                value:
                  device_type: pos
                  edge_id: edge-A1234-tokyo-002
                  target_version: "1.2.3"
                  download_status: completed
                  artifacts_count: 15
                  total_size_bytes: 524288000
                  download_started_at: "2025-01-17T14:30:00Z"
                  download_completed_at: "2025-01-17T14:35:00Z"
              failed:
                summary: Download failed
                value:
                  device_type: pos
                  edge_id: edge-A1234-tokyo-002
                  target_version: "1.2.3"
                  download_status: failed
                  error_message: "Network timeout during file download"
                  artifacts_count: 10
                  total_size_bytes: 300000000
                  download_started_at: "2025-01-17T14:30:00Z"
                  download_completed_at: "2025-01-17T14:40:00Z"
      responses:
        '200':
          description: Download completion acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Download completion recorded successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /artifact-management/apply-complete:
    post:
      tags:
        - Status Notification
      summary: Notify apply completion
      description: |
        Edge device notifies cloud that apply phase (Phase 4-9) is complete.
        Includes success/failure status, rollback information, and downtime duration.
      operationId: notifyApplyComplete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyCompleteRequest'
            examples:
              success:
                summary: Apply completed successfully
                value:
                  device_type: pos
                  edge_id: edge-A1234-tokyo-002
                  target_version: "1.2.3"
                  apply_status: completed
                  apply_started_at: "2025-01-18T02:00:00Z"
                  apply_completed_at: "2025-01-18T02:03:30Z"
                  downtime_seconds: 90
                  health_check_status: passed
                  update_results:
                    - service: cart
                      type: container_image
                      version: "1.2.3"
                      status: success
                    - artifact_name: pos-startup.sh
                      type: script
                      version: "1.2.3"
                      status: success
              rollback:
                summary: Apply failed with automatic rollback
                value:
                  device_type: pos
                  edge_id: edge-A1234-tokyo-002
                  target_version: "1.2.3"
                  apply_status: auto_rollback
                  apply_started_at: "2025-01-18T02:00:00Z"
                  apply_completed_at: "2025-01-18T02:05:00Z"
                  rolled_back_to_version: "1.2.2"
                  error_message: "Health check failed for cart service after 3 attempts"
                  health_check_status: failed
                  update_results:
                    - service: cart
                      type: container_image
                      version: "1.2.3"
                      status: failed
                      error: Health check timeout
      responses:
        '200':
          description: Apply completion acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Apply completion recorded successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ArtifactDownloadRequest:
      type: object
      required:
        - artifact_type
        - artifact_name
        - version
      properties:
        artifact_type:
          type: string
          enum: [script, module, config, image, document]
          description: Type of artifact to download
        artifact_name:
          type: string
          description: Artifact filename
          example: pos-startup.sh
        version:
          type: string
          description: Artifact version
          example: "1.2.3"

    DownloadCompleteRequest:
      type: object
      required:
        - device_type
        - edge_id
        - target_version
        - download_status
        - download_started_at
        - download_completed_at
      properties:
        device_type:
          type: string
          enum: [edge, pos]
          description: Device type
        edge_id:
          type: string
          description: Edge device identifier
          example: edge-A1234-tokyo-002
        target_version:
          type: string
          description: Downloaded version
          example: "1.2.3"
        download_status:
          type: string
          enum: [completed, failed]
          description: Download phase result
        artifacts_count:
          type: integer
          description: Number of downloaded artifacts
          example: 15
        total_size_bytes:
          type: integer
          description: Total downloaded size in bytes
          example: 524288000
        download_started_at:
          type: string
          format: date-time
          description: Download start timestamp (ISO 8601)
        download_completed_at:
          type: string
          format: date-time
          description: Download completion timestamp (ISO 8601)
        error_message:
          type: string
          description: Error message if download_status is failed
          example: Network timeout during file download

    ApplyCompleteRequest:
      type: object
      required:
        - device_type
        - edge_id
        - target_version
        - apply_status
        - apply_started_at
        - apply_completed_at
      properties:
        device_type:
          type: string
          enum: [edge, pos]
          description: Device type
        edge_id:
          type: string
          description: Edge device identifier
          example: edge-A1234-tokyo-002
        target_version:
          type: string
          description: Target version (attempted)
          example: "1.2.3"
        apply_status:
          type: string
          enum: [completed, failed, auto_rollback]
          description: Apply phase result
        apply_started_at:
          type: string
          format: date-time
          description: Apply start timestamp (ISO 8601)
        apply_completed_at:
          type: string
          format: date-time
          description: Apply completion timestamp (ISO 8601)
        downtime_seconds:
          type: integer
          description: Service downtime duration (Phase 6-8)
          example: 90
        rolled_back_to_version:
          type: string
          description: Version rolled back to (if apply_status is auto_rollback)
          example: "1.2.2"
        error_message:
          type: string
          description: Error message if apply failed
          example: Health check failed for cart service after 3 attempts
        health_check_status:
          type: string
          enum: [passed, failed]
          description: Health check result
        update_results:
          type: array
          description: Individual artifact/image update results
          items:
            $ref: '#/components/schemas/UpdateResult'

    UpdateResult:
      type: object
      properties:
        service:
          type: string
          description: Service name (for container images)
          example: cart
        artifact_name:
          type: string
          description: Artifact name (for files)
          example: pos-startup.sh
        type:
          type: string
          enum: [container_image, script, module, config]
          description: Update item type
        version:
          type: string
          example: "1.2.3"
        status:
          type: string
          enum: [success, failed]
          description: Update result
        error:
          type: string
          description: Error message if status is failed
          example: Health check timeout

    SuccessResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Error code in XXYYZZ format
              example: "800301"
            message:
              type: string
              description: Human-readable error message
              example: Artifact not found
            details:
              type: string
              description: Additional error details

  responses:
    Unauthorized:
      description: Unauthorized - Invalid or expired JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "800101"
              message: Invalid or expired token
              details: JWT token verification failed

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "800301"
              message: Artifact not found
              details: Requested artifact does not exist in storage

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: "809999"
              message: Internal server error
              details: An unexpected error occurred
