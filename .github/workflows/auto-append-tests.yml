name: Auto Append Test Skeletons

on:
  push:
    branches: ["main"]
    paths:
      - 'services/*/app/api/**/*.py'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service name (leave empty for all changed services)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  auto-append-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect changed services
        id: changed
        run: |
          if [ -n "${{ github.event.inputs.service }}" ]; then
            echo "${{ github.event.inputs.service }}" > /tmp/changed_services.txt
          else
            git diff --name-only HEAD~1 HEAD \
              | grep '^services/.*/app/api/' \
              | sed 's|services/\([^/]*\)/.*|\1|' \
              | sort -u > /tmp/changed_services.txt
          fi
          echo "Changed services:"
          cat /tmp/changed_services.txt

      - name: Run auto-append for changed services
        run: |
          while IFS= read -r svc; do
            if [ -n "$svc" ]; then
              echo "=== Processing service: $svc ==="
              python3 scripts/auto_append_tests.py --service "$svc"
            fi
          done < /tmp/changed_services.txt

      - name: Commit generated test skeletons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'services/*/tests/unit/*_auto.py' 'services/*/tests/scenario/*_auto.py' 2>/dev/null || true
          git diff --staged --quiet || (
            git commit -m "test: auto-generate test skeletons for API changes [skip ci]" &&
            git push
          )
