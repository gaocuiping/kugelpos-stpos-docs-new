name: Sync Testcases Docs-as-Code

on:
  push:
    branches: ["main"]
    paths:
      - 'services/**/tests/**/*.py'
      - 'scripts/sync_testcases.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-test-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Testcase Synchronization
        run: |
          chmod +x scripts/sync_testcases.py
          python scripts/sync_testcases.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ja/testing/ docs/en/testing/
          git diff --staged --quiet || (git commit -m "docs: auto-sync testcase markdown from python docstrings [skip ci]" && git push)
