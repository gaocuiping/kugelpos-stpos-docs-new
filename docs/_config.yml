title: Kugelpos Documentation
description: Kugelpos POS Backend - API & Architecture Documentation
baseurl: "/kugelpos-stpos-docs-new"
url: ""

remote_theme: just-the-docs/just-the-docs

# Search
search_enabled: true
search.heading_level: 3

# Color scheme
color_scheme: light

# Navigation
nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

# Footer
footer_content: "&copy; Kugelpos Project. Distributed under the Apache License 2.0."

# Heading anchor links
heading_anchors: true

# Collections for multi-language
collections:
  en:
    output: true
    permalink: /en/:path/
  ja:
    output: true
    permalink: /ja/:path/

# Defaults
defaults:
  - scope:
      path: "en"
    values:
      lang: en
  - scope:
      path: "ja"
    values:
      lang: ja

# Exclude
exclude:
  - scripts/
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
